<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>鄭元昕生日應援站 🍏</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;600&family=Noto+Sans+TC:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --green-50: #f0f7f0;
    --green-100: #d6ecda;
    --green-200: #aed4b4;
    --green-400: #5fa86a;
    --green-600: #3a7a45;
    --green-800: #1e4a26;
    --green-900: #0f2a14;
    --cream: #fafaf7;
    --text-primary: #1a2e1c;
    --text-secondary: #4a6650;
    --text-muted: #7a9a80;
    --border: rgba(60,120,70,0.12);
    --border-strong: rgba(60,120,70,0.25);
    --radius-sm: 8px;
    --radius-md: 12px;
    --radius-lg: 18px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Noto Sans TC', sans-serif;
    background: var(--cream);
    color: var(--text-primary);
    min-height: 100vh;
  }

  /* ── HERO ── */
  .hero {
    background: linear-gradient(160deg, #e8f4e8 0%, #f5faf5 50%, #edf7ed 100%);
    border-bottom: 1px solid var(--border-strong);
    padding: 3.5rem 1.5rem 2.5rem;
    text-align: center;
    position: relative;
    overflow: hidden;
  }
  .hero::before {
    content: '';
    position: absolute;
    top: -60px; right: -60px;
    width: 220px; height: 220px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(95,168,106,0.12), transparent 70%);
    pointer-events: none;
  }
  .hero::after {
    content: '';
    position: absolute;
    bottom: -40px; left: -40px;
    width: 180px; height: 180px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(95,168,106,0.09), transparent 70%);
    pointer-events: none;
  }
  .hero-eyebrow {
    font-size: 11px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--green-600);
    font-weight: 500;
    margin-bottom: 1rem;
  }
  .hero-name {
    font-family: 'Noto Serif TC', serif;
    font-size: clamp(2.2rem, 7vw, 4rem);
    font-weight: 600;
    color: var(--green-800);
    line-height: 1.1;
    margin-bottom: 0.4rem;
  }
  .hero-sub {
    font-size: 14px;
    color: var(--text-secondary);
    margin-bottom: 2rem;
  }

  /* countdown */
  .countdown {
    display: inline-flex;
    gap: 6px;
    background: white;
    border: 1px solid var(--border-strong);
    border-radius: var(--radius-md);
    padding: 14px 20px;
    margin-bottom: 1rem;
  }
  .cd-unit {
    text-align: center;
    min-width: 44px;
  }
  .cd-num {
    font-family: 'Noto Serif TC', serif;
    font-size: 1.9rem;
    font-weight: 600;
    color: var(--green-800);
    line-height: 1;
    display: block;
  }
  .cd-label {
    font-size: 10px;
    color: var(--text-muted);
    letter-spacing: 0.06em;
    margin-top: 4px;
  }
  .cd-sep {
    font-size: 1.6rem;
    color: var(--green-200);
    align-self: flex-start;
    padding-top: 2px;
    line-height: 1.8;
  }

  /* ── NAV ── */
  nav {
    position: sticky;
    top: 0;
    z-index: 100;
    background: rgba(250,250,247,0.95);
    backdrop-filter: blur(8px);
    border-bottom: 1px solid var(--border-strong);
  }
  .nav-inner {
    max-width: 900px;
    margin: 0 auto;
    display: flex;
    gap: 0;
    overflow-x: auto;
    scrollbar-width: none;
  }
  .nav-inner::-webkit-scrollbar { display: none; }
  .nav-tab {
    flex-shrink: 0;
    padding: 14px 20px;
    font-size: 13px;
    font-weight: 500;
    color: var(--text-muted);
    cursor: pointer;
    border-bottom: 2px solid transparent;
    transition: color 0.2s, border-color 0.2s;
    white-space: nowrap;
  }
  .nav-tab.active, .nav-tab:hover {
    color: var(--green-600);
    border-bottom-color: var(--green-400);
  }

  /* ── SECTIONS ── */
  .container {
    max-width: 900px;
    margin: 0 auto;
    padding: 0 1rem;
  }
  .section {
    padding: 2.5rem 0;
    border-bottom: 1px solid var(--border);
  }
  .section:last-child { border-bottom: none; }
  .section-title {
    font-family: 'Noto Serif TC', serif;
    font-size: 18px;
    font-weight: 600;
    color: var(--green-800);
    margin-bottom: 1.25rem;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .section-title::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border-strong);
    margin-left: 4px;
  }

  /* ── VIDEOS ── */
  .video-edit-bar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 1rem;
  }
  .btn-add {
    background: var(--green-50);
    border: 1px solid var(--green-200);
    color: var(--green-600);
    padding: 6px 14px;
    border-radius: var(--radius-sm);
    font-size: 12px;
    cursor: pointer;
    font-family: 'Noto Sans TC', sans-serif;
    font-weight: 500;
    transition: background 0.15s;
  }
  .btn-add:hover { background: var(--green-100); }

  .video-form {
    background: var(--green-50);
    border: 1px solid var(--green-200);
    border-radius: var(--radius-md);
    padding: 1rem;
    margin-bottom: 1rem;
    display: none;
  }
  .video-form.open { display: block; }
  .form-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
    margin-bottom: 8px;
  }
  .form-row input, .video-form input {
    width: 100%;
    padding: 8px 10px;
    border: 1px solid var(--border-strong);
    border-radius: var(--radius-sm);
    font-size: 13px;
    font-family: 'Noto Sans TC', sans-serif;
    background: white;
    color: var(--text-primary);
  }
  .form-actions { display: flex; gap: 8px; }
  .btn-save {
    background: var(--green-400);
    color: white;
    border: none;
    padding: 7px 18px;
    border-radius: var(--radius-sm);
    font-size: 13px;
    cursor: pointer;
    font-family: 'Noto Sans TC', sans-serif;
    font-weight: 500;
  }
  .btn-cancel {
    background: white;
    border: 1px solid var(--border-strong);
    color: var(--text-secondary);
    padding: 7px 14px;
    border-radius: var(--radius-sm);
    font-size: 13px;
    cursor: pointer;
    font-family: 'Noto Sans TC', sans-serif;
  }

  .video-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
    gap: 14px;
  }
  .video-card {
    border-radius: var(--radius-md);
    overflow: hidden;
    border: 1px solid var(--border-strong);
    background: white;
    position: relative;
  }
  .video-thumb-wrap {
    position: relative;
    aspect-ratio: 16/9;
    background: var(--green-50);
    cursor: pointer;
  }
  .video-thumb-wrap iframe {
    width: 100%; height: 100%; border: none;
    display: none;
  }
  .video-thumb-wrap .thumb-overlay {
    position: absolute; inset: 0;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    background: var(--green-50);
  }
  .thumb-img {
    position: absolute; inset: 0;
    width: 100%; height: 100%;
    object-fit: cover;
  }
  .play-btn {
    position: relative;
    width: 48px; height: 48px;
    border-radius: 50%;
    background: rgba(255,255,255,0.9);
    display: flex; align-items: center; justify-content: center;
    border: none; cursor: pointer;
    transition: transform 0.15s, background 0.15s;
    z-index: 2;
  }
  .play-btn:hover { transform: scale(1.1); background: white; }
  .play-btn svg { width: 20px; height: 20px; fill: var(--green-600); margin-left: 2px; }
  .video-info {
    padding: 10px 12px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 8px;
  }
  .video-title-text {
    font-size: 13px;
    font-weight: 500;
    color: var(--text-primary);
    flex: 1;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .btn-del {
    background: none;
    border: none;
    color: var(--text-muted);
    cursor: pointer;
    font-size: 14px;
    padding: 2px 4px;
    flex-shrink: 0;
    transition: color 0.15s;
  }
  .btn-del:hover { color: #c0392b; }
  .empty-state {
    text-align: center;
    padding: 2.5rem 1rem;
    color: var(--text-muted);
    font-size: 14px;
    border: 1px dashed var(--border-strong);
    border-radius: var(--radius-md);
  }

  /* ── PHOTOS ── */
  .photo-form {
    background: var(--green-50);
    border: 1px solid var(--green-200);
    border-radius: var(--radius-md);
    padding: 1rem;
    margin-bottom: 1rem;
    display: none;
  }
  .photo-form.open { display: block; }
  .photo-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
    gap: 10px;
  }
  .photo-item {
    position: relative;
    aspect-ratio: 1;
    border-radius: var(--radius-md);
    overflow: hidden;
    border: 1px solid var(--border-strong);
    background: var(--green-50);
    cursor: pointer;
  }
  .photo-item img {
    width: 100%; height: 100%;
    object-fit: cover;
    display: block;
    transition: transform 0.3s;
  }
  .photo-item:hover img { transform: scale(1.05); }
  .photo-overlay {
    position: absolute; inset: 0;
    background: rgba(15,42,20,0.45);
    display: flex; align-items: center; justify-content: center;
    opacity: 0;
    transition: opacity 0.2s;
  }
  .photo-item:hover .photo-overlay { opacity: 1; }
  .photo-del {
    background: rgba(255,255,255,0.9);
    border: none;
    border-radius: 50%;
    width: 32px; height: 32px;
    cursor: pointer;
    font-size: 14px;
    color: #c0392b;
    display: flex; align-items: center; justify-content: center;
  }
  .photo-caption {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    background: linear-gradient(transparent, rgba(15,42,20,0.6));
    color: white;
    font-size: 11px;
    padding: 18px 8px 6px;
    text-align: center;
  }

  /* lightbox */
  .lightbox {
    display: none;
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.85);
    z-index: 1000;
    align-items: center;
    justify-content: center;
  }
  .lightbox.open { display: flex; }
  .lightbox img {
    max-width: 90vw;
    max-height: 90vh;
    border-radius: var(--radius-md);
    object-fit: contain;
  }
  .lightbox-close {
    position: fixed; top: 20px; right: 24px;
    background: rgba(255,255,255,0.1);
    border: 1px solid rgba(255,255,255,0.2);
    color: white; font-size: 20px;
    width: 40px; height: 40px;
    border-radius: 50%;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
  }

  /* ── MESSAGES ── */
  .msg-form {
    background: var(--green-50);
    border: 1px solid var(--green-200);
    border-radius: var(--radius-md);
    padding: 1.25rem;
    margin-bottom: 1.5rem;
  }
  .msg-form input, .msg-form textarea {
    width: 100%;
    padding: 9px 12px;
    border: 1px solid var(--border-strong);
    border-radius: var(--radius-sm);
    font-size: 13px;
    font-family: 'Noto Sans TC', sans-serif;
    background: white;
    color: var(--text-primary);
    margin-bottom: 8px;
  }
  .msg-form textarea {
    height: 80px;
    resize: vertical;
  }
  .msg-form-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
  }
  .msg-wall {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .msg-bubble {
    background: white;
    border: 1px solid var(--border);
    border-radius: var(--radius-md);
    padding: 14px 16px;
    position: relative;
    border-left: 3px solid var(--green-200);
  }
  .msg-meta {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 6px;
  }
  .msg-avatar {
    width: 28px; height: 28px;
    border-radius: 50%;
    background: var(--green-100);
    color: var(--green-800);
    font-size: 11px;
    font-weight: 500;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  .msg-name { font-size: 13px; font-weight: 500; color: var(--text-primary); }
  .msg-loc { font-size: 11px; color: var(--text-muted); }
  .msg-date { font-size: 11px; color: var(--text-muted); margin-left: auto; }
  .msg-text { font-size: 13px; color: var(--text-secondary); line-height: 1.6; }
  .msg-del {
    position: absolute; top: 10px; right: 12px;
    background: none; border: none;
    color: var(--text-muted); cursor: pointer; font-size: 13px;
    transition: color 0.15s;
  }
  .msg-del:hover { color: #c0392b; }
  .msg-count {
    font-size: 12px;
    color: var(--text-muted);
    margin-bottom: 1rem;
  }
  .msg-load-more {
    text-align: center;
    margin-top: 1rem;
  }
  .btn-outline {
    background: white;
    border: 1px solid var(--border-strong);
    color: var(--text-secondary);
    padding: 8px 20px;
    border-radius: var(--radius-sm);
    font-size: 13px;
    cursor: pointer;
    font-family: 'Noto Sans TC', sans-serif;
    transition: background 0.15s;
  }
  .btn-outline:hover { background: var(--green-50); }

  /* ── FOOTER ── */
  footer {
    text-align: center;
    padding: 2rem 1rem;
    font-size: 12px;
    color: var(--text-muted);
    border-top: 1px solid var(--border);
    margin-top: 1rem;
  }

  /* mobile */
  @media (max-width: 600px) {
    .hero { padding: 2.5rem 1rem 2rem; }
    .form-row, .msg-form-row { grid-template-columns: 1fr; }
    .video-grid { grid-template-columns: 1fr; }
    .photo-grid { grid-template-columns: repeat(3, 1fr); }
    .countdown { padding: 10px 14px; gap: 4px; }
    .cd-num { font-size: 1.5rem; }
  }

  @media (prefers-reduced-motion: reduce) {
    * { transition: none !important; animation: none !important; }
  }
</style>
</head>
<body>

<!-- HERO -->
<header class="hero">
  <p class="hero-eyebrow">🍏 2026 生日應援站</p>
  <h1 class="hero-name">鄭元昕</h1>
  <p class="hero-sub">July 2, 2001 · 全球粉絲一起為你慶生</p>
  <div class="countdown" id="countdown">
    <div class="cd-unit"><span class="cd-num" id="cd-d">--</span><span class="cd-label">天</span></div>
    <span class="cd-sep">·</span>
    <div class="cd-unit"><span class="cd-num" id="cd-h">--</span><span class="cd-label">時</span></div>
    <span class="cd-sep">·</span>
    <div class="cd-unit"><span class="cd-num" id="cd-m">--</span><span class="cd-label">分</span></div>
    <span class="cd-sep">·</span>
    <div class="cd-unit"><span class="cd-num" id="cd-s">--</span><span class="cd-label">秒</span></div>
  </div>
  <p id="bday-msg" style="font-size:13px; color:var(--green-600); font-weight:500; display:none; margin-top:8px;">🎂 生日快樂！</p>
</header>

<!-- NAV -->
<nav>
  <div class="nav-inner">
    <div class="nav-tab active" onclick="scrollTo('sec-videos')">表演影片</div>
    <div class="nav-tab" onclick="scrollTo('sec-photos')">精選相冊</div>
    <div class="nav-tab" onclick="scrollTo('sec-messages')">粉絲留言牆</div>
  </div>
</nav>

<!-- MAIN -->
<main class="container">

  <!-- VIDEOS -->
  <section class="section" id="sec-videos">
    <h2 class="section-title">表演影片</h2>
    <div class="video-edit-bar">
      <span style="font-size:12px; color:var(--text-muted);" id="video-count">共 0 支影片</span>
      <button class="btn-add" id="btn-add-video" onclick="toggleVideoForm()">＋ 新增影片</button>
    </div>
    <div id="video-form-wrap">
      <div class="video-form open" id="video-form" style="display:none;">
        <p style="font-size:12px; font-weight:500; color:var(--green-600); margin-bottom:8px;">新增 YouTube 影片</p>
        <div class="form-row">
          <input type="text" id="vf-title" placeholder="影片標題（例：2024 跨年演唱會）">
          <input type="text" id="vf-url" placeholder="YouTube 網址或影片 ID">
        </div>
        <div class="form-actions" style="margin-top:8px;">
          <button class="btn-save" onclick="addVideo()">✓ 加入</button>
          <button class="btn-cancel" onclick="toggleVideoForm()">取消</button>
        </div>
      </div>
    </div>
    <div class="empty-state" id="video-empty">還沒有影片，點右上角「＋ 新增影片」加入你最喜歡的表演！</div>
    <div class="video-grid" id="video-grid"></div>
  </section>

  <!-- PHOTOS -->
  <section class="section" id="sec-photos">
    <h2 class="section-title">精選相冊</h2>
    <div class="video-edit-bar">
      <span style="font-size:12px; color:var(--text-muted);" id="photo-count">共 0 張照片</span>
      <button class="btn-add" onclick="togglePhotoForm()">＋ 新增照片</button>
    </div>
    <div class="photo-form" id="photo-form">
      <div class="form-row" style="margin-bottom:8px;">
        <input type="text" id="pf-url" placeholder="照片網址（.jpg / .png）">
        <input type="text" id="pf-caption" placeholder="說明文字（選填）">
      </div>
      <div class="form-actions">
        <button class="btn-save" onclick="addPhoto()">加入</button>
        <button class="btn-cancel" onclick="togglePhotoForm()">取消</button>
      </div>
    </div>
    <div class="photo-grid" id="photo-grid">
    </div>
    <div class="empty-state" id="photo-empty" style="margin-top:10px;">還沒有照片，點「新增照片」貼上圖片網址！</div>
  </section>

  <!-- MESSAGES -->
  <section class="section" id="sec-messages">
    <h2 class="section-title">粉絲留言牆</h2>
    <div class="msg-form">
      <div class="msg-form-row">
        <input type="text" id="mf-name" placeholder="你的名字（暱稱）">
        <input type="text" id="mf-location" placeholder="來自哪裡（選填）">
      </div>
      <textarea id="mf-text" placeholder="寫下你對鄭元昕的生日祝福 🍏"></textarea>
      <button class="btn-save" onclick="addMessage()">送出祝福</button>
    </div>
    <p class="msg-count" id="msg-count">共 0 則留言</p>
    <div class="msg-wall" id="msg-wall">
      <div class="empty-state" id="msg-empty">第一個留言吧！送上你的生日祝福 🎂</div>
    </div>
    <div class="msg-load-more" id="load-more-wrap" style="display:none;">
      <button class="btn-outline" onclick="loadMoreMessages()">顯示更多留言</button>
    </div>
  </section>
</main>

<footer>
  <p>鄭元昕 2025 生日應援站 🍏 由粉絲用愛製作</p>
</footer>

<!-- LIGHTBOX -->
<div class="lightbox" id="lightbox" onclick="closeLightbox()">
  <button class="lightbox-close" onclick="closeLightbox()">✕</button>
  <img id="lightbox-img" src="" alt="">
</div>

<!-- VIDEO LIGHTBOX -->
<div class="lightbox" id="video-lightbox" onclick="closeVideoLightbox(event)">
  <button class="lightbox-close" onclick="closeVideoLightbox()">✕</button>
  <div id="video-lightbox-inner" style="position:relative; width:min(860px,92vw);">
    <div style="aspect-ratio:16/9; width:100%;">
      <iframe id="video-lightbox-frame"
        src="" allowfullscreen
        allow="autoplay; encrypted-media"
        style="width:100%; height:100%; border:none; border-radius:10px; display:block;">
      </iframe>
    </div>
    <p id="video-lightbox-title" style="color:rgba(255,255,255,0.85); font-size:14px; margin-top:10px; text-align:center; font-family:'Noto Sans TC',sans-serif;"></p>
  </div>
</div>

<script>
// ── Storage keys
const KEYS = { videos: 'yx_videos', photos: 'yx_photos', messages: 'yx_messages' };

// ── Countdown
function updateCountdown() {
  const now = new Date();
  let bday = new Date(2026, 6, 2); // July 2, 2026
  const diff = bday - now;
  const isBday = now >= new Date(2026, 6, 2) && now < new Date(2026, 6, 3);
  if (isBday) {
    document.getElementById('countdown').style.display = 'none';
    document.getElementById('bday-msg').style.display = 'block';
    return;
  }
  const d = Math.floor(diff / 86400000);
  const h = Math.floor((diff % 86400000) / 3600000);
  const m = Math.floor((diff % 3600000) / 60000);
  const s = Math.floor((diff % 60000) / 1000);
  document.getElementById('cd-d').textContent = String(d).padStart(2, '0');
  document.getElementById('cd-h').textContent = String(h).padStart(2, '0');
  document.getElementById('cd-m').textContent = String(m).padStart(2, '0');
  document.getElementById('cd-s').textContent = String(s).padStart(2, '0');
}
updateCountdown();
setInterval(updateCountdown, 1000);

// ── Nav scroll
function scrollTo(id) {
  document.getElementById(id).scrollIntoView({ behavior: 'smooth', block: 'start' });
}

// ── VIDEOS
let videos = [];
try { const _v = localStorage.getItem(KEYS.videos); if (_v) videos = JSON.parse(_v); } catch(e) { videos = []; }

function saveVideos() { try { localStorage.setItem(KEYS.videos, JSON.stringify(videos)); } catch(e) {} }

function getYTId(input) {
  input = input.trim();
  const patterns = [
    /youtu\.be\/([A-Za-z0-9_-]{11})/,
    /[?&]v=([A-Za-z0-9_-]{11})/,
    /embed\/([A-Za-z0-9_-]{11})/,
    /^([A-Za-z0-9_-]{11})$/
  ];
  for (const p of patterns) {
    const m = input.match(p);
    if (m) return m[1];
  }
  return null;
}

function renderVideos() {
  const grid = document.getElementById('video-grid');
  const empty = document.getElementById('video-empty');
  document.getElementById('video-count').textContent = '共 ' + videos.length + ' 支影片';
  grid.innerHTML = '';
  if (videos.length === 0) {
    empty.style.display = '';
    return;
  }
  empty.style.display = 'none';
  videos.forEach((v, i) => {
    const card = document.createElement('div');
    card.className = 'video-card';
    card.innerHTML = `
      <div class="video-thumb-wrap" onclick="playVideo(${i})" style="cursor:pointer;" title="點擊前往 YouTube 觀看">
        <img class="thumb-img" src="https://img.youtube.com/vi/${v.id}/mqdefault.jpg" alt="${v.title}" onerror="this.style.background='var(--green-100)'">
        <div class="thumb-overlay" style="opacity:1; background:rgba(15,42,20,0.18);">
          <button class="play-btn" aria-label="播放 ${v.title}" tabindex="-1">
            <svg viewBox="0 0 24 24"><polygon points="5,3 19,12 5,21"/></svg>
          </button>
        </div>
      </div>
      <div class="video-info">
        <span class="video-title-text" title="${v.title}">${v.title}</span>
        <button class="btn-del" onclick="event.stopPropagation();deleteVideo(${i})" aria-label="刪除">✕</button>
      </div>`;
    grid.appendChild(card);
  });
}

function playVideo(i) {
  const v = videos[i];
  const lb = document.getElementById('video-lightbox');
  const frame = document.getElementById('video-lightbox-frame');
  const title = document.getElementById('video-lightbox-title');
  frame.src = 'https://www.youtube.com/embed/' + v.id + '?autoplay=1&rel=0';
  title.textContent = v.title;
  lb.classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeVideoLightbox(e) {
  if (e && e.target !== document.getElementById('video-lightbox') && !e.target.classList.contains('lightbox-close')) return;
  const lb = document.getElementById('video-lightbox');
  lb.classList.remove('open');
  document.getElementById('video-lightbox-frame').src = '';
  document.body.style.overflow = '';
}

function toggleVideoForm() {
  const f = document.getElementById('video-form');
  const opening = f.style.display === 'none' || f.style.display === '';
  f.style.display = opening ? 'block' : 'none';
  if (opening) setTimeout(() => { const t = document.getElementById('vf-title'); if(t) t.focus(); }, 50);
}

function addVideo() {
  const title = document.getElementById('vf-title').value.trim();
  const url = document.getElementById('vf-url').value.trim();
  if (!title) { alert('請填寫影片標題'); return; }
  const id = getYTId(url);
  if (!id) { alert('請輸入有效的 YouTube 網址或影片 ID'); return; }
  videos.push({ id, title });
  saveVideos();
  renderVideos();
  document.getElementById('vf-title').value = '';
  document.getElementById('vf-url').value = '';
  toggleVideoForm();
}

function deleteVideo(i) {
  if (!confirm('確定要刪除這支影片嗎？')) return;
  videos.splice(i, 1);
  saveVideos();
  renderVideos();
}

// ── PHOTOS
let photos = [];
try { const _p = localStorage.getItem(KEYS.photos); if (_p) photos = JSON.parse(_p); } catch(e) { photos = []; }

function savePhotos() { try { localStorage.setItem(KEYS.photos, JSON.stringify(photos)); } catch(e) {} }

function renderPhotos() {
  const grid = document.getElementById('photo-grid');
  const empty = document.getElementById('photo-empty');
  document.getElementById('photo-count').textContent = '共 ' + photos.length + ' 張照片';
  grid.innerHTML = '';
  if (photos.length === 0) { empty.style.display = ''; return; }
  empty.style.display = 'none';
  photos.forEach((p, i) => {
    const item = document.createElement('div');
    item.className = 'photo-item';
    item.innerHTML = `
      <img src="${p.url}" alt="${p.caption || '照片'}" loading="lazy" onclick="openLightbox(this.dataset.url)" data-url="">
      ${p.caption ? `<div class="photo-caption">${p.caption}</div>` : ''}
      <div class="photo-overlay">
        <button class="photo-del" onclick="event.stopPropagation(); deletePhoto(${i})" aria-label="刪除照片">✕</button>
      </div>`;
    grid.appendChild(item);
  });
}

function togglePhotoForm() {
  const f = document.getElementById('photo-form');
  f.classList.toggle('open');
  if (f.classList.contains('open')) document.getElementById('pf-url').focus();
}

function addPhoto() {
  const url = document.getElementById('pf-url').value.trim();
  const caption = document.getElementById('pf-caption').value.trim();
  if (!url) { alert('請填寫照片網址'); return; }
  photos.push({ url, caption });
  savePhotos();
  renderPhotos();
  document.getElementById('pf-url').value = '';
  document.getElementById('pf-caption').value = '';
  togglePhotoForm();
}

function deletePhoto(i) {
  if (!confirm('確定要刪除這張照片嗎？')) return;
  photos.splice(i, 1);
  savePhotos();
  renderPhotos();
}

function openLightbox(url) {
  document.getElementById('lightbox-img').src = url;
  document.getElementById('lightbox').classList.add('open');
}
function closeLightbox() {
  document.getElementById('lightbox').classList.remove('open');
}

// ── MESSAGES
let messages = [];
let msgPage = 0;
const MSG_PER_PAGE = 10;
try { messages = JSON.parse(localStorage.getItem(KEYS.messages) || '[]'); } catch(e) { messages = []; }

function saveMessages() { try { localStorage.setItem(KEYS.messages, JSON.stringify(messages)); } catch(e) {} }

function renderMessages() {
  const wall = document.getElementById('msg-wall');
  const empty = document.getElementById('msg-empty');
  const loadMoreWrap = document.getElementById('load-more-wrap');
  document.getElementById('msg-count').textContent = '共 ' + messages.length + ' 則留言';
  wall.innerHTML = '';
  if (messages.length === 0) {
    wall.appendChild(empty);
    empty.style.display = '';
    loadMoreWrap.style.display = 'none';
    return;
  }
  empty.style.display = 'none';
  const visible = messages.slice().reverse().slice(0, (msgPage + 1) * MSG_PER_PAGE);
  visible.forEach((msg, i) => {
    const realIdx = messages.length - 1 - i;
    const initials = msg.name ? msg.name.slice(0, 2) : '粉絲';
    const bubble = document.createElement('div');
    bubble.className = 'msg-bubble';
    bubble.innerHTML = `
      <button class="msg-del" onclick="deleteMessage(${realIdx})" aria-label="刪除留言">✕</button>
      <div class="msg-meta">
        <div class="msg-avatar">${initials}</div>
        <span class="msg-name">${msg.name || '匿名粉絲'}</span>
        ${msg.location ? `<span class="msg-loc">· ${msg.location}</span>` : ''}
        <span class="msg-date">${msg.date}</span>
      </div>
      <p class="msg-text">${msg.text}</p>`;
    wall.appendChild(bubble);
  });
  loadMoreWrap.style.display = messages.length > (msgPage + 1) * MSG_PER_PAGE ? '' : 'none';
}

function addMessage() {
  const name = document.getElementById('mf-name').value.trim();
  const location = document.getElementById('mf-location').value.trim();
  const text = document.getElementById('mf-text').value.trim();
  if (!text) { alert('請填寫祝福內容'); return; }
  const now = new Date();
  const date = now.getFullYear() + '/' + String(now.getMonth()+1).padStart(2,'0') + '/' + String(now.getDate()).padStart(2,'0');
  messages.push({ name: name || '匿名粉絲', location, text, date });
  saveMessages();
  msgPage = 0;
  renderMessages();
  document.getElementById('mf-name').value = '';
  document.getElementById('mf-location').value = '';
  document.getElementById('mf-text').value = '';
}

function deleteMessage(i) {
  if (!confirm('確定要刪除這則留言嗎？')) return;
  messages.splice(i, 1);
  saveMessages();
  renderMessages();
}

function loadMoreMessages() {
  msgPage++;
  renderMessages();
}

// ── INIT
renderVideos();
renderPhotos();
renderMessages();
</script>
</body>
</html>
